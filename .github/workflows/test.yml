on: [push, pull_request]
name: "Tests"
permissions:
  contents: read
env:
  GO_STATIC_CHECK_VERSION: "2026.1"
jobs:
  go:
    name: Go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: "go.mod"
          cache-dependency-path: "go.sum"
      - name: "Place index.html file into ui build folder"
        run: |
          mkdir -p ui/build/
          cp ui/index.html ui/build/index.html
      - name: "Ensure go code is properly formatted"
        run: |
          unformatted=$(go fmt ./...)
          if [ -n "$unformatted" ]; then
            echo "::error::The following files are not properly formatted: $unformatted"
            echo "Run 'go fmt ./...' to fix."
            exit 1
          fi
      - name: "Ensure go code is properly modernized / fixed"
        run: |
          go fix ./...
          if ! git diff --exit-code; then
            echo "::error::go fix produced changes. Run 'go fix ./...' to fix."
            exit 1
          fi
      - name: "Lint"
        run: go vet ./...
      - uses: dominikh/staticcheck-action@9716614d4101e79b4340dd97b10e54d68234e431 # v1.4.1
        with:
          install-go: false
          version: "${{ env.GO_STATIC_CHECK_VERSION }}"
      - name: "Test"
        run: go test -cover ./...

  balancer-ui:
    name: Balancer UI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "lts/*"
      - name: "Install dependencies"
        run: npm ci --ignore-scripts
      - name: "Lint"
        run: npm run lint
      - name: "Test"
        run: npm run test -- --run

  semgrep:
    name: Semgrep
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: "Run Semgrep"
        run: semgrep scan --config=auto

  helm:
    name: Helm
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: helm/multi-juicer/
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Verify tools
        run: |
          helm version
      - name: Install Helm Unit Test Plugin
        run: |
          helm plugin install https://github.com/helm-unittest/helm-unittest.git --version 1.0.3
      - name: Helm-Chart Unit Tests
        run: helm unittest .
