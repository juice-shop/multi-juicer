apiVersion: apps/v1
kind: Deployment
metadata:
  name: multi-juicer
  labels:
    {{ include "multi-juicer.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      {{- include "multi-juicer.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/config-map.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- with .Values.pod.annotations }}
          {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "multi-juicer.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: multi-juicer
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: '{{ .Values.repository }}:{{ .Values.tag | default (printf "v%s" .Chart.AppVersion) }}'
          imagePullPolicy: {{ .Values.imagePullPolicy | quote }}
          {{- with .Values.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          env:
          - name: NAMESPACE
            valueFrom:
              fieldRef:
                fieldPath: metadata.namespace
          - name: POD_NAME
            valueFrom:
              fieldRef:
                fieldPath: metadata.name
          - name: MAX_INACTIVE_DURATION
            value: {{ .Values.config.juiceShop.deleteInactiveAfter | quote }}
          - name: MULTI_JUICER_CONFIG_ADMIN_PASSWORD
            valueFrom:
              secretKeyRef:
                key: adminPassword
                name: multi-juicer-secret
          - name: MULTI_JUICER_CONFIG_COOKIE_SIGNING_KEY
            valueFrom:
              secretKeyRef:
                key: cookieParserSecret
                name: multi-juicer-secret
          - name: MULTI_JUICER_CONTENT_SECURITY_POLICY
            value: {{ .Values.contentSecurityPolicy | quote }}
          {{- if .Values.balancer.logoUrl }}
          - name: MULTI_JUICER_BALANCER_LOGO_URL
            value: {{ .Values.balancer.logoUrl | quote }}
          {{- end }}
          - name: LOG_LEVEL
            value: {{ .Values.logLevel | default "info" | quote }}
          {{- if .Values.config.juiceShop.llm.enabled }}
          - name: LLM_API_KEY
            valueFrom:
              secretKeyRef:
                name: {{ .Values.config.juiceShop.llm.existingSecret.name }}
                key: {{ .Values.config.juiceShop.llm.existingSecret.key }}
          - name: LLM_API_URL
            value: {{ .Values.config.juiceShop.llm.apiUrl | quote }}
          {{- end }}
          ports:
            - name: http
              containerPort: 8080
            - name: metrics
              containerPort: 8081
            - name: private
              containerPort: 8082
          livenessProbe:
            httpGet:
              path: /multi-juicer/api/health
              port: http
          readinessProbe:
            httpGet:
              path: /multi-juicer/api/readiness
              port: http
          volumeMounts:
            - name: config-volume
              mountPath: /config/config.json
              subPath: config.json
              readOnly: true
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: config-volume
          configMap:
            name: multi-juicer-config
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
