apiVersion: v1
kind: Secret
metadata:
  name: multi-juicer-secret
  labels:
    {{- include "multi-juicer.labels" . | nindent 4 }}
type: Opaque
data:
  {{- /*
    On `helm upgrade` we re-use the existing values rather than regenerating
    them, so that:
      - user sessions / team cookies remain valid (cookieParserSecret),
      - already-running Juice Shop pods can keep posting to their signed
        webhook URL (webhookSigningKey),
      - the admin password stays stable (adminPassword).

    `lookup` returns nil during `helm template` rendering — i.e. when ArgoCD
    or other GitOps tools render manifests without cluster context. In that
    case we'd regenerate on every sync; such users should either set the
    values explicitly under .Values, or configure Application-level
    `ignoreDifferences` for this Secret. See guides/production-notes.
  */ -}}
  {{- $existing := lookup "v1" "Secret" .Release.Namespace "multi-juicer-secret" -}}
  {{- $existingData := dict -}}
  {{- if and $existing $existing.data -}}
    {{- $existingData = $existing.data -}}
  {{- end }}
  {{- if .Values.cookie.cookieParserSecret }}
  cookieParserSecret: {{ .Values.cookie.cookieParserSecret | b64enc | quote }}
  {{- else if hasKey $existingData "cookieParserSecret" }}
  cookieParserSecret: {{ index $existingData "cookieParserSecret" | quote }}
  {{- else }}
  cookieParserSecret: {{ randAlphaNum 24 | b64enc | quote }}
  {{- end }}
  {{- if .Values.webhook.signingKey }}
  webhookSigningKey: {{ .Values.webhook.signingKey | b64enc | quote }}
  {{- else if hasKey $existingData "webhookSigningKey" }}
  webhookSigningKey: {{ index $existingData "webhookSigningKey" | quote }}
  {{- else }}
  webhookSigningKey: {{ randAlphaNum 32 | b64enc | quote }}
  {{- end }}
  {{- if .Values.adminPassword }}
  adminPassword: {{ .Values.adminPassword | b64enc | quote }}
  {{- else if hasKey $existingData "adminPassword" }}
  adminPassword: {{ index $existingData "adminPassword" | quote }}
  {{- else }}
  adminPassword: {{ randAlphaNum 24 | upper | b64enc | quote }}
  {{- end }}
