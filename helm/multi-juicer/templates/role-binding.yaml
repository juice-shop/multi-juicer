apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: multi-juicer
  namespace: {{ .Release.Namespace | quote }}
  labels: {{- include "multi-juicer.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: multi-juicer # Name is case sensitive
roleRef:
  kind: Role
  name: multi-juicer
  apiGroup: rbac.authorization.k8s.io
