suite: Full Snapshot

tests:
  - it: default values render correctly
    templates:
      # templates are specified here as it fails otherwise when empty templates are rendered (e.g. service-monitors which are skipped in this config)
      - templates/juice-shop/config-map.yaml

      - templates/config-map.yaml
      - templates/deployment.yaml
      - templates/private-service.yaml
      - templates/role-binding.yaml
      - templates/role.yaml
      - templates/secret.yaml
      - templates/service-account.yaml
      - templates/service.yaml
    chart:
      version: 42.0.0
      appVersion: 42.0.0
    set:
      juiceShop:
        tag: v42.42.42
      # Use an externally-managed Secret so snapshots stay deterministic
      # (otherwise the chart-generated Secret would contain randAlphaNum output).
      existingSecret:
        name: "external-multi-juicer-secret"
    asserts:
      - matchSnapshot: {}
  - it: production notes work correctly
    templates:
      # templates are specified here as it fails otherwise when empty templates are rendered (e.g. service-monitors which are skipped in this config)
      - templates/juice-shop/config-map.yaml

      - templates/config-map.yaml
      - templates/deployment.yaml
      - templates/private-service.yaml
      - templates/role-binding.yaml
      - templates/role.yaml
      - templates/secret.yaml
      - templates/service-account.yaml
      - templates/service.yaml
    chart:
      version: 42.0.0
      appVersion: 42.0.0
    set:
      replicas: 3
      cookie:
        secure: true
      existingSecret:
        name: "external-multi-juicer-secret"
      metrics:
        basicAuth:
          password: "ROTATE_THIS_YOU_LAZY_ASS"

      juiceShop:
        tag: v42.42.42
        maxInstances: 42
        nodeEnv: "ctf"
        ctfKey: "DONT_LET_ME_FIND_YOU_USING_THIS_EXACT_VALUE"
    asserts:
      - matchSnapshot: {}
  - it: full values render out correctly
    chart:
      version: 42.0.0
      appVersion: 42.0.0
    set:
      ingress:
        enabled: true
        ingressClassName: cool-ingress
        annotations:
          kubernetes.io/tls-acme: "true"
        hosts:
          - host: multi-juicer.local
            paths:
              - "/"
        tls:
          - secretName: tls-secret
            hosts:
              - multi-juicer.local
      replicas: 3
      cookie:
        secure: true
      existingSecret:
        name: "external-multi-juicer-secret"
      metrics:
        basicAuth:
          password: "ROTATE_THIS_YOU_LAZY_ASS"
        serviceMonitor:
          enabled: true
        dashboards:
          enabled: true

      juiceShop:
        tag: v42.42.42
        maxInstances: 42
        nodeEnv: "ctf"
        ctfKey: "DONT_LET_ME_FIND_YOU_USING_THIS_EXACT_VALUE"
    asserts:
      - matchSnapshot: {}
  - it: custom balancer theme renders into the config map
    templates:
      - templates/config-map.yaml
    chart:
      version: 42.0.0
      appVersion: 42.0.0
    set:
      config:
        theme:
          logoUrl: "https://example.com/custom-logo.svg"
          faviconUrl: "https://example.com/custom-favicon.ico"
    asserts:
      - matchSnapshot: {}
  - it: auto-generates the Secret with all three keys when existingSecret is unset
    template: templates/secret.yaml
    chart:
      version: 42.0.0
      appVersion: 42.0.0
    asserts:
      - equal:
          path: kind
          value: Secret
      - equal:
          path: metadata.name
          value: multi-juicer-secret
      - isNotNullOrEmpty:
          path: data.cookieParserSecret
      - isNotNullOrEmpty:
          path: data.webhookSigningKey
      - isNotNullOrEmpty:
          path: data.adminPassword
  - it: skips Secret rendering when existingSecret.name is set
    template: templates/secret.yaml
    chart:
      version: 42.0.0
      appVersion: 42.0.0
    set:
      existingSecret:
        name: "my-external-secret"
    asserts:
      - hasDocuments:
          count: 0
  - it: deployment references the external Secret when existingSecret.name is set
    template: templates/deployment.yaml
    chart:
      version: 42.0.0
      appVersion: 42.0.0
    set:
      existingSecret:
        name: "my-external-secret"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: MULTI_JUICER_CONFIG_ADMIN_PASSWORD
            valueFrom:
              secretKeyRef:
                key: adminPassword
                name: my-external-secret
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: MULTI_JUICER_CONFIG_COOKIE_SIGNING_KEY
            valueFrom:
              secretKeyRef:
                key: cookieParserSecret
                name: my-external-secret
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: MULTI_JUICER_CONFIG_WEBHOOK_SIGNING_KEY
            valueFrom:
              secretKeyRef:
                key: webhookSigningKey
                name: my-external-secret
