suite: Full Snapshot

tests:
  - it: default values render correctly
    templates:
      # templates are specified here as it fails otherwise when empty templates are rendered (e.g. service-monitors which are skipped in this config)
      - templates/juice-shop/config-map.yaml

      - templates/config-map.yaml
      - templates/deployment.yaml
      - templates/private-service.yaml
      - templates/role-binding.yaml
      - templates/role.yaml
      - templates/secret.yaml
      - templates/service-account.yaml
      - templates/service.yaml
    chart:
      version: 42.0.0
      appVersion: 42.0.0
    set:
      juiceShop:
        tag: v42.42.42
      # randomized values are still specified here as the snapshot tests would fail otherwise
      adminPassword: "ABCDEFGH"
      cookie:
        cookieParserSecret: "THIS_IS_A_EXAMPLE_DONT_USE_THIS_AS_THE_ACTUAL_SECRET"
    asserts:
      - matchSnapshot: {}
  - it: production notes work correctly
    templates:
      # templates are specified here as it fails otherwise when empty templates are rendered (e.g. service-monitors which are skipped in this config)
      - templates/juice-shop/config-map.yaml

      - templates/config-map.yaml
      - templates/deployment.yaml
      - templates/private-service.yaml
      - templates/role-binding.yaml
      - templates/role.yaml
      - templates/secret.yaml
      - templates/service-account.yaml
      - templates/service.yaml
    chart:
      version: 42.0.0
      appVersion: 42.0.0
    set:
      adminPassword: "ABCDEFGH"
      replicas: 3
      cookie:
        cookieParserSecret: "THIS_IS_A_EXAMPLE_DONT_USE_THIS_AS_THE_ACTUAL_SECRET"
        secure: true
      metrics:
        basicAuth:
          password: "ROTATE_THIS_YOU_LAZY_ASS"

      juiceShop:
        tag: v42.42.42
        maxInstances: 42
        nodeEnv: "ctf"
        ctfKey: "DONT_LET_ME_FIND_YOU_USING_THIS_EXACT_VALUE"
    asserts:
      - matchSnapshot: {}
  - it: full values render out correctly
    chart:
      version: 42.0.0
      appVersion: 42.0.0
    set:
      ingress:
        enabled: true
        ingressClassName: cool-ingress
        annotations:
          kubernetes.io/tls-acme: "true"
        hosts:
          - host: multi-juicer.local
            paths:
              - "/"
        tls:
          - secretName: tls-secret
            hosts:
              - multi-juicer.local
      adminPassword: "ABCDEFGH"
      replicas: 3
      cookie:
        cookieParserSecret: "THIS_IS_A_EXAMPLE_DONT_USE_THIS_AS_THE_ACTUAL_SECRET"
        secure: true
      metrics:
        basicAuth:
          password: "ROTATE_THIS_YOU_LAZY_ASS"
        serviceMonitor:
          enabled: true
        dashboards:
          enabled: true

      juiceShop:
        tag: v42.42.42
        maxInstances: 42
        nodeEnv: "ctf"
        ctfKey: "DONT_LET_ME_FIND_YOU_USING_THIS_EXACT_VALUE"
    asserts:
      - matchSnapshot: {}
  - it: custom balancer theme renders into the config map
    templates:
      - templates/config-map.yaml
    chart:
      version: 42.0.0
      appVersion: 42.0.0
    set:
      adminPassword: "ABCDEFGH"
      cookie:
        cookieParserSecret: "THIS_IS_A_EXAMPLE_DONT_USE_THIS_AS_THE_ACTUAL_SECRET"
      config:
        theme:
          logoUrl: "https://example.com/custom-logo.svg"
          faviconUrl: "https://example.com/custom-favicon.ico"
    asserts:
      - matchSnapshot: {}
